<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Apex Futures"/>
<title>Apex Futures</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#040404;--bg2:#080808;--bg3:#0a0a0a;--border:#1a1a1a;--border2:#111;--green:#00ff88;--red:#ff4455;--blue:#4488ff;--amber:#ffaa00;--text:#ccc}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}
#header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border2);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#000}
.logo-title{font-size:13px;font-weight:700;letter-spacing:.1em;color:#fff}
.logo-sub{font-size:9px;letter-spacing:.2em;color:#444}
.live-dot{display:flex;align-items:center;gap:6px}
.live-dot span:first-child{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:glow 2s ease-in-out infinite}
.live-dot span:last-child{color:#444;font-size:10px;letter-spacing:.1em}
#mainApp{display:flex;flex-direction:column;flex:1;overflow:hidden}
#cardWrap{padding:12px 12px 0;flex-shrink:0}
.trade-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-header{padding:13px 16px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.verdict-badge{display:inline-flex;align-items:center;gap:8px;border-radius:4px;padding:6px 13px}
.verdict-dot{width:7px;height:7px;border-radius:50%}
.verdict-text{font-size:12px;font-weight:700;letter-spacing:.15em}
.conf-wrap{min-width:100px}
.conf-labels{display:flex;justify-content:space-between;margin-bottom:4px}
.conf-label{color:#444;font-size:9px;letter-spacing:.1em}
.conf-bar-bg{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.conf-bar{height:100%;border-radius:2px;transition:width .8s ease}
.card-summary{padding:13px 16px;border-bottom:1px solid var(--border2);font-family:Georgia,serif;font-size:12px;line-height:1.7;color:#bbb}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border2)}
.price-cell{padding:12px 14px;border-right:1px solid var(--border2)}
.price-cell:last-child{border-right:none}
.price-cell-label{color:#444;font-size:9px;letter-spacing:.12em;margin-bottom:5px}
.price-cell-val{font-size:13px;font-weight:700}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border2)}
.info-col{padding:12px 14px}
.info-col:first-child{border-right:1px solid var(--border2)}
.info-col-label{color:#444;font-size:9px;letter-spacing:.12em;margin-bottom:8px}
.info-item{font-size:11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:7px;line-height:1.4}
.card-footer{padding:10px 16px}
.card-footer-label{color:#444;font-size:9px;letter-spacing:.12em;display:inline}
.card-footer-text{color:#666;font-size:11px;display:inline;margin-left:6px}
#chatScroll{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch}
.examples-label{color:#222;font-size:9px;letter-spacing:.15em;text-align:center;margin-bottom:12px}
.example-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;cursor:pointer;color:#555;font-size:11px;font-family:'Space Mono',monospace;line-height:1.6;width:100%;text-align:left}
.user-msg{display:flex;justify-content:flex-end;margin-bottom:8px}
.user-bubble{background:#0e1a2e;border:1px solid #1a2a44;border-radius:8px 8px 2px 8px;padding:9px 13px;max-width:88%;color:#88aadd;font-size:11px;line-height:1.6}
.loading-wrap{display:flex;justify-content:center;padding:14px 0;gap:6px;align-items:center}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--green);opacity:.5;animation:pulse 1.2s ease-in-out infinite}
#inputArea{flex-shrink:0;padding:10px 12px 12px;border-top:1px solid var(--border2);background:var(--bg)}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
#msgInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;resize:none;line-height:1.6;max-height:90px;min-height:18px}
#msgInput::placeholder{color:#2a2a2a}
#sendBtn{background:linear-gradient(135deg,var(--green),var(--blue));border:none;border-radius:6px;padding:8px 12px;color:#000;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
#sendBtn:disabled{background:#111;color:#333;cursor:not-allowed}
.input-disclaimer{color:#1e1e1e;font-size:9px;letter-spacing:.1em;margin-top:6px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes glow{0%,100%{opacity:.7}50%{opacity:1;box-shadow:0 0 10px var(--green)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo-wrap">
      <div class="logo-icon">▲</div>
      <div>
        <div class="logo-title">APEX FUTURES</div>
        <div class="logo-sub">CRYPTO TRADE ANALYST</div>
      </div>
    </div>
    <div class="live-dot"><span></span><span>LIVE</span></div>
  </div>
  <div id="mainApp">
    <div id="cardWrap"><div class="trade-card" id="tradeCard"></div></div>
    <div id="chatScroll">
      <div id="chatContent">
        <div id="examplesWrap" style="padding-top:8px">
          <div class="examples-label">EXAMPLE SETUPS — TAP TO USE</div>
          <button class="example-chip" onclick="useExample(this)">BTC perp, 4H. Price at $83,500 testing resistance at $84k. RSI 62, MACD bullish cross forming. Previous support at $82k. What's the play?</button>
          <button class="example-chip" onclick="useExample(this)">ETH short setup on 1H. Just rejected from $1,620 double top. Volume spiking on the rejection. Support at $1,580 and $1,540.</button>
          <button class="example-chip" onclick="useExample(this)">SOL 15m scalp. Range between $125-$128 for 3 hours. Just broke above $128 with high volume. Targeting $131.</button>
        </div>
      </div>
      <div id="loadingDots" style="display:none" class="loading-wrap">
        <div class="loading-dot" style="animation-delay:0s"></div>
        <div class="loading-dot" style="animation-delay:.2s"></div>
        <div class="loading-dot" style="animation-delay:.4s"></div>
      </div>
    </div>
    <div id="inputArea">
      <div class="input-box">
        <textarea id="msgInput" rows="1" placeholder="Describe your setup: asset, timeframe, key levels, indicators..."></textarea>
        <button id="sendBtn" onclick="sendMessage()">ANALYZE →</button>
      </div>
      <div class="input-disclaimer">NOT FINANCIAL ADVICE — FOR EDUCATIONAL USE ONLY</div>
    </div>
  </div>
</div>
<script>
const KEY='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';
const SP=`You are an expert crypto futures trader. Respond ONLY in raw JSON, no markdown, no backticks, no extra text. Use this exact structure: {"verdict":"LONG or SHORT or NO TRADE or WAIT","confidence":number 1-100,"entry":"price","stopLoss":"price","target1":"price","target2":"price","riskReward":"e.g. 1:2.5","leverage":"e.g. 5x-10x","summary":"2-3 sentence analysis","keyLevels":["level1","level2"],"risks":["risk1","risk2"],"marketContext":"brief note"}`;
let messages=[],loading=false;
const VS={LONG:{bg:'#0d2e1a',border:'#00ff88',color:'#00ff88'},SHORT:{bg:'#2e0d0d',border:'#ff4455',color:'#ff4455'},'NO TRADE':{bg:'#1a1a0d',border:'#ffaa00',color:'#ffaa00'},WAIT:{bg:'#0d1a2e',border:'#4488ff',color:'#4488ff'},READY:{bg:'#0d0d1a',border:'#8866ff',color:'#8866ff'}};
window.addEventListener('load',()=>{
  renderCard({verdict:'READY',confidence:100,entry:'—',stopLoss:'—',target1:'—',target2:'—',riskReward:'—',leverage:'—',summary:"Describe your crypto futures setup and I'll give you a full trade analysis — entry, stop, targets, leverage and risk/reward.",keyLevels:[],risks:[],marketContext:'Ready to analyze BTC, ETH, SOL, or any crypto futures pair.'});
  const inp=document.getElementById('msgInput');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,90)+'px';});
});
function renderCard(d){
  const vs=VS[d.verdict]||VS.READY,isReady=d.verdict==='READY',cc=d.confidence>=70?'#00ff88':d.confidence>=45?'#ffaa00':'#ff4455';
  const pc=row=>row.map((c,i)=>`<div class="price-cell"${i===2?' style="border-right:none"':''}><div class="price-cell-label">${c.l}</div><div class="price-cell-val" style="color:${c.c}">${c.v}</div></div>`).join('');
  const kl=(d.keyLevels||[]).map(l=>`<div class="info-item"><span style="color:#333">▸</span><span style="color:#aaa">${l}</span></div>`).join('');
  const rk=(d.risks||[]).map(r=>`<div class="info-item"><span style="color:#662222">⚠</span><span style="color:#ff6666">${r}</span></div>`).join('');
  document.getElementById('tradeCard').innerHTML=`
    <div class="card-header">
      <div class="verdict-badge" style="background:${vs.bg};border:1px solid ${vs.border}">
        <div class="verdict-dot" style="background:${vs.border};box-shadow:0 0 7px ${vs.border}"></div>
        <div class="verdict-text" style="color:${vs.color}">${d.verdict}</div>
      </div>
      ${!isReady?`<div class="conf-wrap"><div class="conf-labels"><span class="conf-label">CONFIDENCE</span><span class="conf-label" style="color:${cc};font-weight:700">${d.confidence}%</span></div><div class="conf-bar-bg"><div class="conf-bar" style="width:${d.confidence}%;background:linear-gradient(90deg,${cc}88,${cc})"></div></div></div>`:''}
    </div>
    <div class="card-summary">${d.summary}</div>
    ${!isReady?`
    <div class="price-grid">${pc([{l:'ENTRY',v:d.entry,c:'#4488ff'},{l:'STOP LOSS',v:d.stopLoss,c:'#ff4455'},{l:'TARGET 1',v:d.target1,c:'#00ff88'}])}</div>
    <div class="price-grid">${pc([{l:'TARGET 2',v:d.target2,c:'#00ddaa'},{l:'RISK/REWARD',v:d.riskReward,c:'#ffaa00'},{l:'LEVERAGE',v:d.leverage,c:'#cc88ff'}])}</div>
    ${kl||rk?`<div class="info-grid"><div class="info-col"><div class="info-col-label">KEY LEVELS</div>${kl}</div><div class="info-col"><div class="info-col-label">RISKS</div>${rk}</div></div>`:''}
    ${d.marketContext?`<div class="card-footer"><span class="card-footer-label">MARKET CONTEXT</span><span class="card-footer-text">${d.marketContext}</span></div>`:''}
    `:''}`;
}
function useExample(el){document.getElementById('msgInput').value=el.textContent;sendMessage();}
function addUserBubble(t){
  const ex=document.getElementById('examplesWrap');if(ex)ex.remove();
  const d=document.createElement('div');d.className='user-msg fade-in';
  d.innerHTML=`<div class="user-bubble">${t.replace(/</g,'&lt;')}</div>`;
  document.getElementById('chatContent').appendChild(d);
  setTimeout(()=>document.getElementById('chatScroll').scrollTop=99999,50);
}
async function sendMessage(){
  const inp=document.getElementById('msgInput'),text=inp.value.trim();
  if(!text||loading)return;
  loading=true;inp.value='';inp.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  addUserBubble(text);
  messages.push({role:'user',content:text});
  document.getElementById('loadingDots').style.display='flex';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SP,messages})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=(data.content||[]).map(b=>b.text||'').join('');
    messages.push({role:'assistant',content:raw});
    renderCard(JSON.parse(raw.replace(/```json|```/g,'').trim()));
  }catch(err){
    renderCard({verdict:'NO TRADE',confidence:0,entry:'—',stopLoss:'—',target1:'—',target2:'—',riskReward:'—',leverage:'—',summary:'Error: '+(err.message||'Something went wrong. Try again.'),keyLevels:[],risks:['API error'],marketContext:''});
  }finally{
    loading=false;
    document.getElementById('loadingDots').style.display='none';
    document.getElementById('sendBtn').disabled=false;
  }
}
</script>
</body>
</html
