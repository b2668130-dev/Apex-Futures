<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Apex Futures" />
  <title>Apex Futures — Crypto Trade Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #040404; --bg2: #080808; --bg3: #0a0a0a;
      --border: #1a1a1a; --border2: #111;
      --green: #00ff88; --red: #ff4455; --blue: #4488ff;
      --amber: #ffaa00; --purple: #cc88ff;
      --text: #ccc; --muted: #666; --dim: #333; --dimmer: #222;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }
    #header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border2); background: var(--bg); flex-shrink: 0; z-index: 10; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 30px; height: 30px; border-radius: 7px; background: linear-gradient(135deg, var(--green), var(--blue)); display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #000; }
    .logo-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: #fff; }
    .logo-sub { font-size: 9px; letter-spacing: 0.2em; color: #444; }
    .live-dot { display: flex; align-items: center; gap: 6px; }
    .live-dot span:first-child { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); animation: glow 2s ease-in-out infinite; }
    .live-dot span:last-child { color: #444; font-size: 10px; letter-spacing: 0.1em; }
    #apiSetup { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; gap: 20px; }
    #apiSetup.hidden { display: none; }
    .setup-icon { width: 56px; height: 56px; border-radius: 14px; background: linear-gradient(135deg, var(--green)22, var(--blue)22); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .setup-title { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 0.08em; text-align: center; }
    .setup-sub { color: #555; font-size: 11px; line-height: 1.7; text-align: center; max-width: 300px; }
    .setup-sub a { color: var(--blue); text-decoration: none; }
    .api-input-wrap { width: 100%; max-width: 340px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .api-input-wrap label { color: #444; font-size: 9px; letter-spacing: 0.15em; }
    .api-input-wrap input { background: transparent; border: none; outline: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; width: 100%; }
    .btn-primary { width: 100%; max-width: 340px; background: linear-gradient(135deg, var(--green), var(--blue)); border: none; border-radius: 8px; padding: 13px; color: #000; font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; }
    .setup-note { color: #2a2a2a; font-size: 9px; letter-spacing: 0.1em; text-align: center; max-width: 300px; line-height: 1.6; }
    #mainApp { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #mainApp.hidden { display: none; }
    #cardWrap { padding: 12px 12px 0; flex-shrink: 0; }
    .trade-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .card-header { padding: 13px 16px; border-bottom: 1px solid var(--border2); display: flex; justify-content: space-between; align-items: center; }
    .verdict-badge { display: inline-flex; align-items: center; gap: 8px; border-radius: 4px; padding: 6px 13px; }
    .verdict-dot { width: 7px; height: 7px; border-radius: 50%; }
    .verdict-text { font-size: 12px; font-weight: 700; letter-spacing: 0.15em; }
    .conf-wrap { min-width: 100px; }
    .conf-labels { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .conf-label { color: #444; font-size: 9px; letter-spacing: 0.1em; }
    .conf-bar-bg { height: 3px; background: #1a1a1a; border-radius: 2px; overflow: hidden; }
    .conf-bar { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
    .card-summary { padding: 13px 16px; border-bottom: 1px solid var(--border2); font-family: Georgia, serif; font-size: 12px; line-height: 1.7; color: #bbb; }
    .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid var(--border2); }
    .price-cell { padding: 12px 14px; border-right: 1px solid var(--border2); }
    .price-cell:last-child { border-right: none; }
    .price-cell-label { color: #444; font-size: 9px; letter-spacing: 0.12em; margin-bottom: 5px; }
    .price-cell-val { font-size: 13px; font-weight: 700; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border2); }
    .info-col { padding: 12px 14px; }
    .info-col:first-child { border-right: 1px solid var(--border2); }
    .info-col-label { color: #444; font-size: 9px; letter-spacing: 0.12em; margin-bottom: 8px; }
    .info-item { font-size: 11px; margin-bottom: 5px; display: flex; align-items: flex-start; gap: 7px; line-height: 1.4; }
    .card-footer { padding: 10px 16px; }
    .card-footer-label { color: #444; font-size: 9px; letter-spacing: 0.12em; display: inline; }
    .card-footer-text { color: #666; font-size: 11px; display: inline; margin-left: 6px; }
    #chatScroll { flex: 1; overflow-y: auto; padding: 10px 12px; -webkit-overflow-scrolling: touch; }
    .examples-label { color: #222; font-size: 9px; letter-spacing: 0.15em; text-align: center; margin-bottom: 12px; }
    .example-chip { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; color: #555; font-size: 11px; font-family: 'Space Mono', monospace; line-height: 1.6; width: 100%; text-align: left; }
    .user-msg { display: flex; justify-content: flex-end; margin-bottom: 8px; }
    .user-bubble { background: #0e1a2e; border: 1px solid #1a2a44; border-radius: 8px 8px 2px 8px; padding: 9px 13px; max-width: 88%; color: #88aadd; font-size: 11px; line-height: 1.6; }
    .loading-wrap { display: flex; justify-content: center; padding: 14px 0; gap: 6px; align-items: center; }
    .loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); opacity: 0.5; animation: pulse 1.2s ease-in-out infinite; }
    #inputArea { flex-shrink: 0; padding: 10px 12px 12px; border-top: 1px solid var(--border2); background: var(--bg); }
    .input-box { display: flex; gap: 8px; align-items: flex-end; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    #msgInput { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Space Mono', monospace; font-size: 12px; resize: none; line-height: 1.6; max-height: 90px; min-height: 18px; }
    #msgInput::placeholder { color: #2a2a2a; }
    #sendBtn { background: linear-gradient(135deg, var(--green), var(--blue)); border: none; border-radius: 6px; padding: 8px 12px; color: #000; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    #sendBtn:disabled { background: #111; color: #333; cursor: not-allowed; }
    .input-disclaimer { color: #1e1e1e; font-size: 9px; letter-spacing: 0.1em; margin-top: 6px; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    @keyframes glow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; box-shadow: 0 0 10px var(--green); } }
    @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>

<div id="app">

      <div class="logo-icon">▲</div>
      <div>

        <div class="logo-sub">CRYPTO TRADE ANALYST</div>
      </div>

</div>
