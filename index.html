<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Apex Futures"/>
<title>Apex Futures</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#040404;--bg2:#080808;--bg3:#0a0a0a;--border:#1a1a1a;--border2:#111;--green:#00ff88;--red:#ff4455;--blue:#4488ff;--amber:#ffaa00;--text:#ccc}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto}
#header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border2);flex-shrink:0}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--green),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000}
.logo-title{font-size:12px;font-weight:700;letter-spacing:.1em;color:#fff}
.logo-sub{font-size:8px;letter-spacing:.2em;color:#444}
.live-dot{display:flex;align-items:center;gap:6px}
.live-dot span:first-child{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:glow 2s ease-in-out infinite}
.live-dot span:last-child{color:#444;font-size:9px;letter-spacing:.1em}
#quickScan{flex-shrink:0;padding:10px 12px;border-bottom:1px solid var(--border2);background:var(--bg2)}
.scan-label{color:#444;font-size:9px;letter-spacing:.15em;margin-bottom:8px}
.scan-row{display:flex;gap:6px;align-items:center}
.scan-input{flex:1;background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:9px 12px;color:#fff !important;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;outline:none;letter-spacing:.1em;-webkit-text-fill-color:#fff}
.scan-input::placeholder{color:#333;font-size:11px;font-weight:400;letter-spacing:.05em;-webkit-text-fill-color:#333}
.scan-btn{background:linear-gradient(135deg,var(--green),var(--blue));border:none;border-radius:6px;padding:9px 14px;color:#000;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;letter-spacing:.05em}
.scan-btn:disabled{background:#111;color:#333;cursor:not-allowed}
.tf-row{display:flex;gap:5px;margin-top:7px}
.tf-btn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:5px 10px;color:#555;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s}
.tf-btn.active{border-color:var(--green);color:var(--green);background:#0d2e1a}
#marketBar{flex-shrink:0;padding:8px 12px;border-bottom:1px solid var(--border2);display:none;gap:16px;align-items:center;overflow-x:auto}
.mkt-item{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.mkt-label{color:#333;font-size:8px;letter-spacing:.1em}
.mkt-val{font-size:12px;font-weight:700}
#cardWrap{padding:10px 12px 0;flex-shrink:0}
.trade-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.card-header{padding:11px 14px;border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center}
.verdict-badge{display:inline-flex;align-items:center;gap:8px;border-radius:4px;padding:5px 12px}
.verdict-dot{width:7px;height:7px;border-radius:50%}
.verdict-text{font-size:12px;font-weight:700;letter-spacing:.15em}
.conf-wrap{min-width:90px}
.conf-labels{display:flex;justify-content:space-between;margin-bottom:4px}
.conf-label{color:#444;font-size:9px;letter-spacing:.1em}
.conf-bar-bg{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.conf-bar{height:100%;border-radius:2px;transition:width .8s ease}
.card-summary{padding:11px 14px;border-bottom:1px solid var(--border2);font-family:Georgia,serif;font-size:11px;line-height:1.7;color:#bbb}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid var(--border2)}
.price-cell{padding:10px 12px;border-right:1px solid var(--border2)}
.price-cell:last-child{border-right:none}
.price-cell-label{color:#444;font-size:8px;letter-spacing:.12em;margin-bottom:4px}
.price-cell-val{font-size:13px;font-weight:700}
.info-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border2)}
.info-col{padding:10px 12px}
.info-col:first-child{border-right:1px solid var(--border2)}
.info-col-label{color:#444;font-size:8px;letter-spacing:.12em;margin-bottom:7px}
.info-item{font-size:10px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.card-footer{padding:8px 14px}
.card-footer-label{color:#444;font-size:8px;letter-spacing:.12em;display:inline}
.card-footer-text{color:#666;font-size:10px;display:inline;margin-left:5px}
#chatScroll{flex:1;overflow-y:auto;padding:8px 12px;-webkit-overflow-scrolling:touch}
.user-msg{display:flex;justify-content:flex-end;margin-bottom:6px}
.user-bubble{background:#0e1a2e;border:1px solid #1a2a44;border-radius:8px 8px 2px 8px;padding:8px 12px;max-width:88%;color:#88aadd;font-size:11px;line-height:1.6}
.system-msg{color:#333;font-size:10px;text-align:center;margin:6px 0;letter-spacing:.05em}
.loading-wrap{display:flex;justify-content:center;padding:12px 0;gap:6px;align-items:center}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--green);opacity:.5;animation:pulse 1.2s ease-in-out infinite}
#inputArea{flex-shrink:0;padding:8px 12px 10px;border-top:1px solid var(--border2);background:var(--bg)}
.input-box{display:flex;gap:8px;align-items:flex-end;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:9px 12px}
#msgInput{flex:1;background:transparent;border:none;outline:none;color:#fff;-webkit-text-fill-color:#fff;font-family:'Space Mono',monospace;font-size:12px;resize:none;line-height:1.6;max-height:80px;min-height:18px}
#msgInput::placeholder{color:#333;-webkit-text-fill-color:#333}
#sendBtn{background:linear-gradient(135deg,var(--green),var(--blue));border:none;border-radius:6px;padding:7px 11px;color:#000;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
#sendBtn:disabled{background:#111;color:#333;cursor:not-allowed}
.input-disclaimer{color:#1a1a1a;font-size:8px;letter-spacing:.1em;margin-top:5px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes glow{0%,100%{opacity:.7}50%{opacity:1;box-shadow:0 0 10px var(--green)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease forwards}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="logo-wrap">
      <div class="logo-icon">▲</div>
      <div>
        <div class="logo-title">APEX FUTURES</div>
        <div class="logo-sub">LIVE CRYPTO ANALYST</div>
      </div>
    </div>
    <div class="live-dot"><span></span><span>LIVE</span></div>
  </div>
  <div id="quickScan">
    <div class="scan-label">LIVE MARKET SCAN</div>
    <div class="scan-row">
      <input type="text" id="symbolInput" class="scan-input" placeholder="BTC, ETH, SOL, XRP..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
      <button class="scan-btn" id="scanBtn" onclick="runScan()">SCAN →</button>
    </div>
    <div class="tf-row">
      <button class="tf-btn active" onclick="setTf(this,'5m')">5M</button>
      <button class="tf-btn" onclick="setTf(this,'15m')">15M</button>
      <button class="tf-btn" onclick="setTf(this,'1h')">1H</button>
      <button class="tf-btn" onclick="setTf(this,'4h')">4H</button>
      <button class="tf-btn" onclick="setTf(this,'1d')">1D</button>
    </div>
  </div>
  <div id="marketBar">
    <div class="mkt-item"><div class="mkt-label">PRICE</div><div class="mkt-val" id="mktPrice">—</div></div>
    <div class="mkt-item"><div class="mkt-label">24H CHG</div><div class="mkt-val" id="mktChange">—</div></div>
    <div class="mkt-item"><div class="mkt-label">RSI(14)</div><div class="mkt-val" id="mktRsi">—</div></div>
    <div class="mkt-item"><div class="mkt-label">MACD</div><div class="mkt-val" id="mktMacd">—</div></div>
    <div class="mkt-item"><div class="mkt-label">SUPPORT</div><div class="mkt-val" id="mktSupport">—</div></div>
    <div class="mkt-item"><div class="mkt-label">RESIST</div><div class="mkt-val" id="mktResist">—</div></div>
  </div>
  <div id="cardWrap"><div class="trade-card" id="tradeCard"></div></div>
  <div id="chatScroll">
    <div id="chatContent">
      <div class="system-msg" style="margin-top:12px">Type a coin above for live analysis — or describe a setup below</div>
    </div>
    <div id="loadingDots" style="display:none" class="loading-wrap">
      <div class="loading-dot" style="animation-delay:0s"></div>
      <div class="loading-dot" style="animation-delay:.2s"></div>
      <div class="loading-dot" style="animation-delay:.4s"></div>
    </div>
  </div>
  <div id="inputArea">
    <div class="input-box">
      <textarea id="msgInput" rows="1" placeholder="Or describe your setup manually..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">→</button>
    </div>
    <div class="input-disclaimer">NOT FINANCIAL ADVICE — FOR EDUCATIONAL USE ONLY</div>
  </div>
</div>
<script>
const WORKER='https://workerman.b2668130.workers.dev';
let messages=[],loading=false,selectedTf='5m';
const VS={LONG:{bg:'#0d2e1a',border:'#00ff88',color:'#00ff88'},SHORT:{bg:'#2e0d0d',border:'#ff4455',color:'#ff4455'},'NO TRADE':{bg:'#1a1a0d',border:'#ffaa00',color:'#ffaa00'},WAIT:{bg:'#0d1a2e',border:'#4488ff',color:'#4488ff'},READY:{bg:'#0d0d1a',border:'#8866ff',color:'#8866ff'}};

window.addEventListener(‘load’,()=>{
renderCard({verdict:‘READY’,confidence:100,entry:’—’,stopLoss:’—’,target1:’—’,target2:’—’,riskReward:’—’,leverage:’—’,summary:“Type a coin symbol above (BTC, ETH, SOL…) and tap SCAN for a live AI analysis using real Binance data. Or describe a setup manually below.”,keyLevels:[],risks:[],marketContext:‘Live candle data • Auto RSI & MACD • Real support/resistance’});
const inp=document.getElementById(‘msgInput’);
inp.addEventListener(‘keydown’,e=>{if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();sendMessage();}});
inp.addEventListener(‘input’,()=>{inp.style.height=‘auto’;inp.style.height=Math.min(inp.scrollHeight,80)+‘px’;});
document.getElementById(‘symbolInput’).addEventListener(‘keydown’,e=>{if(e.key===‘Enter’)runScan();});
});

function setTf(el,tf){
selectedTf=tf;
document.querySelectorAll(’.tf-btn’).forEach(b=>b.classList.remove(‘active’));
el.classList.add(‘active’);
}

function calcRSI(closes,period=14){
if(closes.length<period+1)return null;
let gains=0,losses=0;
for(let i=closes.length-period;i<closes.length;i++){
const d=closes[i]-closes[i-1];
if(d>0)gains+=d;else losses-=d;
}
const rs=(gains/period)/((losses/period)||0.0001);
return 100-(100/(1+rs));
}

function calcEMA(data,period){
const k=2/(period+1);
let ema=data[0];
for(let i=1;i<data.length;i++)ema=data[i]*k+ema*(1-k);
return ema;
}

function calcMACD(closes){
if(closes.length<26)return{macd:0,signal:0,hist:0};
const ema12=calcEMA(closes.slice(-26),12);
const ema26=calcEMA(closes.slice(-26),26);
const macd=ema12-ema26;
return{macd,signal:macd*0.9,hist:macd*0.1};
}

function findLevels(candles){
const highs=candles.map(c=>c.high);
const lows=candles.map(c=>c.low);
const recentHigh=Math.max(…highs.slice(-20));
const recentLow=Math.min(…lows.slice(-20));
const pivot=(recentHigh+recentLow+candles[candles.length-1].close)/3;
return{support:pivot*2-recentHigh,resistance:pivot*2-recentLow,pivot};
}

function fmt(n){
if(n>=1000)return n.toLocaleString(‘en’,{maximumFractionDigits:2});
if(n>=1)return n.toFixed(4);
return n.toFixed(6);
}

async function runScan(){
const sym=document.getElementById(‘symbolInput’).value.trim();
if(!sym||loading)return;
loading=true;
document.getElementById(‘scanBtn’).disabled=true;
document.getElementById(‘loadingDots’).style.display=‘flex’;
addSystemMsg(`Fetching live ${sym.toUpperCase()} ${selectedTf.toUpperCase()} data...`);

try{
// Route Binance calls through Cloudflare worker to avoid CORS
const candleUrl=`https://api.binance.com/api/v3/klines?symbol=${sym.toUpperCase()}USDT&interval=${selectedTf}&limit=100`;
const tickerUrl=`https://api.binance.com/api/v3/ticker/24hr?symbol=${sym.toUpperCase()}USDT`;

```
const [candleRes,tickerRes]=await Promise.all([
  fetch(candleUrl),
  fetch(tickerUrl)
]);

if(!candleRes.ok)throw new Error(`Symbol not found: ${sym.toUpperCase()}. Try BTC, ETH, SOL, XRP, BNB`);

const rawCandles=await candleRes.json();
const tickerData=await tickerRes.json();

const candles=rawCandles.map(c=>({
  open:parseFloat(c[1]),high:parseFloat(c[2]),
  low:parseFloat(c[3]),close:parseFloat(c[4]),
  volume:parseFloat(c[5])
}));

const closes=candles.map(c=>c.close);
const rsi=calcRSI(closes);
const macd=calcMACD(closes);
const levels=findLevels(candles);
const price=parseFloat(tickerData.lastPrice);
const change=parseFloat(tickerData.priceChangePercent);
const vol=parseFloat(tickerData.quoteVolume);
const avgVol=candles.slice(-20).reduce((a,c)=>a+c.volume,0)/20;
const volRatio=candles[candles.length-1].volume/avgVol;

// Market bar
document.getElementById('marketBar').style.display='flex';
document.getElementById('mktPrice').textContent=fmt(price);
const chgEl=document.getElementById('mktChange');
chgEl.textContent=(change>0?'+':'')+change.toFixed(2)+'%';
chgEl.style.color=change>0?'var(--green)':'var(--red)';
const rsiEl=document.getElementById('mktRsi');
rsiEl.textContent=rsi?rsi.toFixed(1):'—';
rsiEl.style.color=rsi>70?'var(--red)':rsi<30?'var(--green)':'var(--amber)';
document.getElementById('mktMacd').textContent=macd.hist>0?'▲ BULL':'▼ BEAR';
document.getElementById('mktMacd').style.color=macd.hist>0?'var(--green)':'var(--red)';
document.getElementById('mktSupport').textContent=fmt(levels.support);
document.getElementById('mktResist').textContent=fmt(levels.resistance);

const prompt=`LIVE MARKET DATA — ${sym.toUpperCase()}USDT — ${selectedTf.toUpperCase()} TIMEFRAME
```

Current Price: ${fmt(price)}
24h Change: ${change.toFixed(2)}%
24h Volume: $${(vol/1e6).toFixed(1)}M

TECHNICAL INDICATORS:
RSI(14): ${rsi?rsi.toFixed(2):‘N/A’}
MACD: ${macd.macd.toFixed(6)} | Signal: ${macd.signal.toFixed(6)} | Histogram: ${macd.hist.toFixed(6)}
MACD Direction: ${macd.hist>0?‘BULLISH’:‘BEARISH’}

KEY LEVELS:
Support: ${fmt(levels.support)}
Pivot: ${fmt(levels.pivot)}
Resistance: ${fmt(levels.resistance)}

RECENT CANDLES (last 5):
${candles.slice(-5).map((c,i)=>`  [${i+1}] O:${fmt(c.open)} H:${fmt(c.high)} L:${fmt(c.low)} C:${fmt(c.close)}`).join(’\n’)}

Volume vs 20-avg: ${volRatio.toFixed(2)}x ${volRatio>1.5?’(HIGH)’:volRatio<0.7?’(LOW)’:’(NORMAL)’}

Analyze this live data and provide your trade recommendation.`;

```
messages=[{role:'user',content:prompt}];
addSystemMsg(`Live data loaded ✓ — Running AI analysis...`);
await callAI();
```

}catch(err){
addSystemMsg(`Error: ${err.message}`);
loading=false;
document.getElementById(‘scanBtn’).disabled=false;
document.getElementById(‘loadingDots’).style.display=‘none’;
}
}

const SP=`You are an expert crypto futures trader with access to live market data. Analyze the provided real-time data and respond ONLY in raw JSON, no markdown, no backticks, no extra text. Use this exact structure: {"verdict":"LONG or SHORT or NO TRADE or WAIT","confidence":number 1-100,"entry":"price","stopLoss":"price","target1":"price","target2":"price","riskReward":"e.g. 1:2.5","leverage":"e.g. 5x-10x","summary":"2-3 sentence analysis referencing the actual live data","keyLevels":["level1","level2"],"risks":["risk1","risk2"],"marketContext":"what to watch"}`;

async function callAI(){
try{
const res=await fetch(WORKER,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’},
body:JSON.stringify({model:‘claude-sonnet-4-20250514’,max_tokens:1000,system:SP,messages})
});
const data=await res.json();
if(data.error)throw new Error(data.error.message);
const raw=(data.content||[]).map(b=>b.text||’’).join(’’);
messages.push({role:‘assistant’,content:raw});
renderCard(JSON.parse(raw.replace(/`json|`/g,’’).trim()));
}catch(err){
renderCard({verdict:‘NO TRADE’,confidence:0,entry:’—’,stopLoss:’—’,target1:’—’,target2:’—’,riskReward:’—’,leverage:’—’,summary:‘Error: ‘+(err.message||‘Something went wrong.’),keyLevels:[],risks:[‘API error’],marketContext:’’});
}finally{
loading=false;
document.getElementById(‘scanBtn’).disabled=false;
document.getElementById(‘loadingDots’).style.display=‘none’;
}
}

async function sendMessage(){
const inp=document.getElementById(‘msgInput’),text=inp.value.trim();
if(!text||loading)return;
loading=true;inp.value=’’;inp.style.height=‘auto’;
document.getElementById(‘sendBtn’).disabled=true;
addUserBubble(text);
messages.push({role:‘user’,content:text});
document.getElementById(‘loadingDots’).style.display=‘flex’;
await callAI();
document.getElementById(‘sendBtn’).disabled=false;
}

function renderCard(d){
const vs=VS[d.verdict]||VS.READY,isReady=d.verdict===‘READY’,cc=d.confidence>=70?’#00ff88’:d.confidence>=45?’#ffaa00’:’#ff4455’;
const pc=row=>row.map((c,i)=>`<div class="price-cell"${i===2?' style="border-right:none"':''}><div class="price-cell-label">${c.l}</div><div class="price-cell-val" style="color:${c.c}">${c.v}</div></div>`).join(’’);
const kl=(d.keyLevels||[]).map(l=>`<div class="info-item"><span style="color:#333">▸</span><span style="color:#aaa">${l}</span></div>`).join(’’);
const rk=(d.risks||[]).map(r=>`<div class="info-item"><span style="color:#662222">⚠</span><span style="color:#ff6666">${r}</span></div>`).join(’’);
document.getElementById(‘tradeCard’).innerHTML=` <div class="card-header"> <div class="verdict-badge" style="background:${vs.bg};border:1px solid ${vs.border}"> <div class="verdict-dot" style="background:${vs.border};box-shadow:0 0 7px ${vs.border}"></div> <div class="verdict-text" style="color:${vs.color}">${d.verdict}</div> </div> ${!isReady?`<div class="conf-wrap"><div class="conf-labels"><span class="conf-label">CONFIDENCE</span><span class="conf-label" style="color:${cc};font-weight:700">${d.confidence}%</span></div><div class="conf-bar-bg"><div class="conf-bar" style="width:${d.confidence}%;background:linear-gradient(90deg,${cc}88,${cc})"></div></div></div>`:''} </div> <div class="card-summary">${d.summary}</div> ${!isReady?`
<div class="price-grid">${pc([{l:‘ENTRY’,v:d.entry,c:’#4488ff’},{l:‘STOP LOSS’,v:d.stopLoss,c:’#ff4455’},{l:‘TARGET 1’,v:d.target1,c:’#00ff88’}])}</div>
<div class="price-grid">${pc([{l:‘TARGET 2’,v:d.target2,c:’#00ddaa’},{l:‘RISK/REWARD’,v:d.riskReward,c:’#ffaa00’},{l:‘LEVERAGE’,v:d.leverage,c:’#cc88ff’}])}</div>
${kl||rk?`<div class="info-grid"><div class="info-col"><div class="info-col-label">KEY LEVELS</div>${kl}</div><div class="info-col"><div class="info-col-label">RISKS</div>${rk}</div></div>`:’’}
${d.marketContext?`<div class="card-footer"><span class="card-footer-label">MARKET CONTEXT</span><span class="card-footer-text">${d.marketContext}</span></div>`:’’}
`:''}`;
}

function addUserBubble(t){
const d=document.createElement(‘div’);d.className=‘user-msg fade-in’;
d.innerHTML=`<div class="user-bubble">${t.replace(/</g,'&lt;')}</div>`;
document.getElementById(‘chatContent’).appendChild(d);
setTimeout(()=>document.getElementById(‘chatScroll’).scrollTop=99999,50);
}

function addSystemMsg(t){
const d=document.createElement(‘div’);d.className=‘system-msg fade-in’;
d.textContent=t;
document.getElementById(‘chatContent’).appendChild(d);
setTimeout(()=>document.getElementById(‘chatScroll’).scrollTop=99999,50);
}
</script>

</body>
</html>
